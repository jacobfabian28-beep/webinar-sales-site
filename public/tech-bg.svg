<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0f172a"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.2" fill="#f97316" opacity="0.18"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- Horizontal circuit lines -->
  <line x1="0" y1="80" x2="220" y2="80" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <line x1="220" y1="80" x2="220" y2="160" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <line x1="220" y1="160" x2="400" y2="160" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <circle cx="220" cy="80" r="3.5" fill="#f97316" opacity="0.35"/>
  <circle cx="220" cy="160" r="3.5" fill="#f97316" opacity="0.35"/>
  <circle cx="400" cy="160" r="3.5" fill="#f97316" opacity="0.35"/>

  <line x1="400" y1="160" x2="560" y2="160" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <line x1="560" y1="160" x2="560" y2="80" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <line x1="560" y1="80" x2="800" y2="80" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <circle cx="560" cy="160" r="3.5" fill="#38bdf8" opacity="0.3"/>
  <circle cx="560" cy="80" r="3.5" fill="#38bdf8" opacity="0.3"/>

  <line x1="0" y1="300" x2="120" y2="300" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <line x1="120" y1="300" x2="120" y2="420" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <line x1="120" y1="420" x2="320" y2="420" stroke="#38bdf8" stroke-width="1" opacity="0.12"/>
  <circle cx="120" cy="300" r="3.5" fill="#38bdf8" opacity="0.3"/>
  <circle cx="120" cy="420" r="3.5" fill="#38bdf8" opacity="0.3"/>
  <circle cx="320" cy="420" r="3.5" fill="#38bdf8" opacity="0.3"/>

  <line x1="320" y1="420" x2="320" y2="500" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <line x1="320" y1="500" x2="520" y2="500" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <line x1="520" y1="500" x2="520" y2="420" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <line x1="520" y1="420" x2="800" y2="420" stroke="#f97316" stroke-width="1" opacity="0.15"/>
  <circle cx="320" cy="500" r="3.5" fill="#f97316" opacity="0.35"/>
  <circle cx="520" cy="500" r="3.5" fill="#f97316" opacity="0.35"/>
  <circle cx="520" cy="420" r="3.5" fill="#f97316" opacity="0.35"/>

  <line x1="650" y1="0" x2="650" y2="260" stroke="#f97316" stroke-width="1" opacity="0.12"/>
  <line x1="650" y1="260" x2="740" y2="260" stroke="#f97316" stroke-width="1" opacity="0.12"/>
  <line x1="740" y1="260" x2="740" y2="600" stroke="#f97316" stroke-width="1" opacity="0.12"/>
  <circle cx="650" cy="260" r="3.5" fill="#f97316" opacity="0.25"/>
  <circle cx="740" cy="260" r="3.5" fill="#f97316" opacity="0.25"/>

  <!-- Node chips -->
  <rect x="180" y="66" width="80" height="28" rx="4" fill="none" stroke="#f97316" stroke-width="1" opacity="0.25"/>
  <rect x="185" y="71" width="12" height="4" rx="1" fill="#f97316" opacity="0.3"/>
  <rect x="201" y="71" width="20" height="4" rx="1" fill="#f97316" opacity="0.2"/>
  <rect x="185" y="79" width="30" height="4" rx="1" fill="#f97316" opacity="0.15"/>

  <rect x="370" y="146" width="80" height="28" rx="4" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <rect x="375" y="151" width="12" height="4" rx="1" fill="#38bdf8" opacity="0.3"/>
  <rect x="391" y="151" width="20" height="4" rx="1" fill="#38bdf8" opacity="0.2"/>
  <rect x="375" y="159" width="30" height="4" rx="1" fill="#38bdf8" opacity="0.15"/>

  <rect x="80" y="406" width="80" height="28" rx="4" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.2"/>
  <rect x="85" y="411" width="12" height="4" rx="1" fill="#38bdf8" opacity="0.3"/>
  <rect x="101" y="411" width="20" height="4" rx="1" fill="#38bdf8" opacity="0.2"/>
  <rect x="85" y="419" width="30" height="4" rx="1" fill="#38bdf8" opacity="0.15"/>

  <rect x="480" y="486" width="80" height="28" rx="4" fill="none" stroke="#f97316" stroke-width="1" opacity="0.25"/>
  <rect x="485" y="491" width="12" height="4" rx="1" fill="#f97316" opacity="0.3"/>
  <rect x="501" y="491" width="20" height="4" rx="1" fill="#f97316" opacity="0.2"/>
  <rect x="485" y="499" width="30" height="4" rx="1" fill="#f97316" opacity="0.15"/>

  <!-- Glow blobs -->
  <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f97316" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="200" cy="300" rx="300" ry="200" fill="url(#glow1)"/>

  <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
  </radialGradient>
  <ellipse cx="650" cy="200" rx="250" ry="180" fill="url(#glow2)"/>
</svg>
